<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var theme = localStorage.getItem('ceylon-theme') || 
          (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <style>
      html { background-color: #1A1A2E; }
      html[data-theme="light"] { background-color: #F8F6F0; }
      body { opacity: 0; }
      body.loaded { opacity: 1; transition: opacity 0.15s ease; }
    </style>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ceylon Trails — Discover Sri Lanka's most breathtaking destinations, book unforgettable activities, and plan your dream tropical getaway." />
    <meta property="og:title" content="Ceylon Trails — Discover Sri Lanka" />
    <meta property="og:description" content="Explore the pearl of the Indian Ocean. Book unique experiences across Sri Lanka's stunning landscapes." />
    <meta property="og:type" content="website" />
    <title>Ceylon Trails — Discover Sri Lanka</title>
  </head>
  <body>
    <!-- Navigation -->
    <header class="navbar" id="navbar"></header>

    <!-- Main Content -->
    <main id="app">
      <!-- Hero Section -->
      <section class="hero" id="hero">
        <div class="hero-bg">
          <div style="width:100%;height:100%;background:var(--gradient-hero);"></div>
        </div>
        <div class="container hero-content" style="color: var(--color-white);">
          <p class="overline reveal">Welcome to Paradise</p>
          <h1 class="display-text reveal" style="margin-bottom: var(--space-md);">
            Explore the Pearl<br/>of the Indian Ocean
          </h1>
          <p class="lead reveal" style="color: rgba(255,255,255,0.8); margin-bottom: var(--space-xl);">
            From ancient temples to pristine beaches, misty mountains to wild safaris — discover Sri Lanka with Ceylon Trails.
          </p>
          <div class="flex gap-md reveal">
            <a href="/activities.html" class="btn btn-primary btn-lg" id="hero-cta-explore">Explore Activities</a>
            <a href="/destinations.html" class="btn btn-secondary btn-lg" id="hero-cta-destinations">View Destinations</a>
          </div>
        </div>
      </section>

      <!-- Placeholder: More home sections will be added in Phase 2 -->
    </main>

    <!-- Footer -->
    <footer id="footer"></footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
