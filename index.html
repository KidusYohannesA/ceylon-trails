<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var theme = localStorage.getItem('ceylon-theme') || 
          (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <style>
      html { background-color: #1A1A2E; }
      html[data-theme="light"] { background-color: #F8F6F0; }
      body { opacity: 0; }
      body.loaded { opacity: 1; transition: opacity 0.15s ease; }
    </style>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ceylon Trails — Discover Sri Lanka's most breathtaking destinations, book unforgettable activities, and plan your dream tropical getaway." />
    <meta property="og:title" content="Ceylon Trails — Discover Sri Lanka" />
    <meta property="og:description" content="Explore the pearl of the Indian Ocean. Book unique experiences across Sri Lanka's stunning landscapes." />
    <meta property="og:type" content="website" />
    <title>Ceylon Trails — Discover Sri Lanka</title>
  </head>
  <body>
    <!-- Navigation -->
    <header class="navbar" id="navbar"></header>

    <!-- Main Content -->
    <main id="app">
      <!-- Hero Section — Full Viewport with Image Carousel -->
      <section class="hero-home" id="hero">
        <div class="hero-carousel" id="hero-carousel">
          <div class="hero-slide active">
            <img src="/assets/images/hero/hero-sigiriya.png" alt="Sigiriya Rock Fortress at golden hour" />
          </div>
          <div class="hero-slide">
            <img src="/assets/images/hero/hero-beach.png" alt="Pristine tropical beach at sunset" />
          </div>
          <div class="hero-slide">
            <img src="/assets/images/hero/hero-tea-country.png" alt="Misty tea plantations in hill country" />
          </div>
        </div>

        <div class="container hero-content" style="color: var(--color-white);">
          <div class="hero-overline reveal">
            <span class="overline-line"></span>
            <span class="overline" style="color: var(--color-secondary);">Welcome to Paradise</span>
          </div>
          <h1 class="hero-title reveal">
            Explore the <span class="highlight">Pearl</span><br/>of the Indian Ocean
          </h1>
          <p class="hero-description reveal">
            From ancient temples to pristine beaches, misty mountains to wild safaris — discover Sri Lanka with Ceylon Trails.
          </p>
          <div class="hero-actions reveal">
            <a href="/activities.html" class="btn btn-primary btn-lg" id="hero-cta-explore">Explore Activities</a>
            <a href="/destinations.html" class="btn btn-secondary btn-lg" id="hero-cta-destinations">View Destinations</a>
          </div>
        </div>

        <!-- Carousel Indicators -->
        <div class="hero-indicators" id="hero-indicators">
          <button class="hero-indicator active" data-index="0" aria-label="Slide 1"></button>
          <button class="hero-indicator" data-index="1" aria-label="Slide 2"></button>
          <button class="hero-indicator" data-index="2" aria-label="Slide 3"></button>
        </div>

        <!-- Scroll Down Hint -->
        <div class="hero-scroll-indicator">
          <span>Scroll</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12l7 7 7-7" />
          </svg>
        </div>
      </section>

      <!-- Remaining sections injected dynamically by home.js -->
    </main>

    <!-- Footer -->
    <footer id="footer"></footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
