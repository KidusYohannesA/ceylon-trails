<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var theme = localStorage.getItem('ceylon-theme') || 
          (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <style>
      html { background-color: #1A1A2E; }
      html[data-theme="light"] { background-color: #F4EFE6; }
      body { opacity: 0; }
      body.loaded { opacity: 1; transition: opacity 0.15s ease; }
    </style>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Get in touch with Ceylon Trails. We'd love to help you plan your perfect Sri Lankan adventure." />
    <title>Contact Us — Ceylon Trails</title>
  </head>
  <body>
    <header class="navbar" id="navbar"></header>
    <main id="app">
      <section class="page-header">
        <div class="container">
          <p class="overline">Get in Touch</p>
          <h1>Contact Us</h1>
          <p class="lead" style="color: rgba(255,255,255,0.7);">Have questions? We'd love to hear from you.</p>
        </div>
      </section>
      <!-- Contact content will be added in Phase 5 -->
    </main>
    <footer id="footer"></footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
